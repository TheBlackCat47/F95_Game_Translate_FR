<!DOCTYPE html>
<!-- Dernière mise à jour : 25/03/2026 22:15:08 -->
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Translate FR</title>
    <link rel="icon" type="image/png" href="./assets/logo/gtf95.png">
    <link rel="apple-touch-icon" href="./assets/logo/gtf95.png">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="aa7556a1-8dd7-4d62-ae7b-3b3be469d039"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px 30px;
            border-bottom: 2px solid #0f3460;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-brand img {
            width: 36px;
            height: 36px;
            border-radius: 8px;
        }
        header h1 {
            font-size: 1.6rem;
            color: #e94560;
        }
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .controls.collapsed { display: none; }
        .controls input[type="text"] {
            flex: 1;
            min-width: 220px;
            padding: 8px 14px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 0.95rem;
        }
        .controls input:focus { outline: none; border-color: #e94560; }
        .controls select {
            padding: 8px 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .stats {
            font-size: 0.85rem;
            color: #888;
            padding: 6px 0 0 4px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 24px;
        }
        .card {
            background: #1a1a2e;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #222;
            transition: transform 0.2s, border-color 0.2s;
            contain: content;
            content-visibility: auto;
            contain-intrinsic-size: 0 360px;
        }
        .card:hover {
            transform: translateY(-3px);
            border-color: #e94560;
        }
        .card-img-wrap {
            width: 100%;
            height: 180px;
            background: #111;
            position: relative;
            overflow: hidden;
        }
        .card-img-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg, #111 30%, #1a1a2e 50%, #111 70%);
            background-size: 200% 100%;
            animation: none;
        }
        .card-img-wrap.shimmer::before {
            animation: shimmer 1.5s infinite;
        }
        .card-img-wrap.loaded::before { display: none; }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .card-img.visible { opacity: 1; }
        .card-body { padding: 14px; }
        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .card-title a {
            color: #e94560;
            text-decoration: none;
        }
        .card-title a:hover { text-decoration: underline; }
        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-en-cours  { background: #0d6efd22; color: #6ea8fe; border: 1px solid #0d6efd44; }
        .badge-termine   { background: #19875422; color: #63d99a; border: 1px solid #19875444; }
        .badge-abandonne { background: #dc354522; color: #f08090; border: 1px solid #dc354544; }
        .badge-type      { background: #6f42c122; color: #b197fc; border: 1px solid #6f42c144; }
        .badge-trad-type { background: #fd7e1422; color: #fdba74; border: 1px solid #fd7e1444; }
        .card-info {
            font-size: 0.82rem;
            color: #aaa;
            line-height: 1.6;
        }
        .card-info span { color: #ccc; }
        .card-tags {
            margin-top: 8px;
            font-size: 0.72rem;
            color: #666;
            line-height: 1.5;
        }
        .card-links {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .btn:hover { opacity: 0.8; }
        .btn-game { background: #e94560; color: #fff; }
        .btn-trad { color: #fff; }
        .btn-logo {
            width: 14px;
            height: 14px;
            object-fit: contain;
            flex-shrink: 0;
            filter: brightness(0) invert(1);
            display: block;
        }
        .btn-trad svg.btn-logo { fill: #fff; }
        .btn-integree {
            background: none;
            border: 1px solid #444;
            color: #888;
            cursor: default;
            pointer-events: none;
        }
        .btn-integree:hover { opacity: 1; }
        #loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: #888;
            font-size: 1.1rem;
        }
        #error {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #f08090;
            font-size: 1rem;
            display: none;
        }
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 1.1rem;
        }

        /* Reset button */
        .reset-btn {
            background: none;
            border: 1px solid #444;
            color: #aaa;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: border-color 0.2s, color 0.2s;
        }
        .reset-btn:hover { border-color: #e94560; color: #e94560; }
        .reset-btn { display: none; }
        .reset-btn.visible { display: inline-block; }

        /* Toggle controls button (mobile) */
        .toggle-controls {
            display: none;
            background: none;
            border: 1px solid #444;
            color: #aaa;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: border-color 0.2s, color 0.2s;
        }
        .toggle-controls:hover { border-color: #e94560; color: #e94560; }
        @media (max-width: 768px) {
            .toggle-controls { display: inline-block; }
        }

        /* Navigation tabs */
        .nav-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 12px;
        }
        .nav-tab {
            background: none;
            border: none;
            color: #888;
            padding: 8px 18px;
            font-size: 0.95rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }
        .nav-tab:hover { color: #ccc; }
        .nav-tab.active { color: #e94560; border-bottom-color: #e94560; }

        /* MAJ panel */
        .maj-panel {
            display: none;
            padding: 24px;
            max-width: 900px;
            margin: 0 auto;
        }
        .maj-panel.visible { display: block; }
        .maj-panel h2 {
            font-size: 1.2rem;
            color: #e94560;
            margin-bottom: 16px;
        }
        .maj-loading {
            color: #888;
            text-align: center;
            padding: 40px;
        }
        .maj-date-group { margin-bottom: 18px; }
        .maj-date {
            font-size: 0.9rem;
            font-weight: 600;
            color: #ccc;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid #222;
        }
        .maj-entry {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 5px 0;
            font-size: 0.88rem;
        }
        .maj-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .maj-type-ajout { background: #19875422; color: #63d99a; border: 1px solid #19875444; }
        .maj-type-maj   { background: #0d6efd22; color: #6ea8fe; border: 1px solid #0d6efd44; }
        .maj-type-other { background: #6f42c122; color: #b197fc; border: 1px solid #6f42c144; }
        .maj-games { color: #bbb; }
        .game-link {
            color: #6ea8fe; cursor: pointer;
            border-bottom: 1px dotted #6ea8fe55;
            transition: color .15s, border-color .15s;
        }
        .game-link:hover { color: #93c5fd; border-bottom-color: #93c5fd; }

        /* ── Modal jeu ── */
        .modal-overlay {
            display:none; position:fixed; inset:0; z-index:500;
            background:rgba(0,0,0,.78);
            align-items:center; justify-content:center; padding:20px;
        }
        .modal-overlay.visible { display:flex; }
        .modal-box {
            background:#1a1a2e; border:1px solid #333; border-radius:12px;
            max-width:460px; width:100%; overflow:hidden; position:relative;
            box-shadow:0 24px 64px rgba(0,0,0,.7);
            animation:modal-pop .18s ease;
        }
        @keyframes modal-pop { from{transform:scale(.94);opacity:0} to{transform:scale(1);opacity:1} }
        .modal-close {
            position:absolute; top:10px; right:10px; z-index:2;
            background:rgba(0,0,0,.55); border:none; color:#aaa;
            width:28px; height:28px; border-radius:50%; cursor:pointer;
            font-size:.85rem; display:flex; align-items:center; justify-content:center;
            transition:background .15s, color .15s;
        }
        .modal-close:hover { background:#e94560; color:#fff; }
        .modal-img { width:100%; height:180px; background:#111; overflow:hidden; }
        .modal-img img { width:100%; height:100%; object-fit:cover; display:block; }
        .modal-body { padding:16px; }
        .modal-title { font-size:1.05rem; font-weight:700; margin-bottom:10px; }
        .modal-title a { color:#e94560; text-decoration:none; }
        .modal-title a:hover { text-decoration:underline; }
        .modal-meta { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
        .modal-info { font-size:.82rem; color:#aaa; line-height:1.7; margin-bottom:12px; }
        .modal-info span { color:#ccc; }
        .modal-links { display:flex; gap:8px; flex-wrap:wrap; }
        .modal-tags { margin-top:8px; font-size:.72rem; color:#555; line-height:1.5; }

        /* Info panel */
        .info-panel {
            display: none;
            padding: 32px 24px;
            max-width: 800px;
            margin: 0 auto;
        }
        .info-panel.visible { display: block; }
        .info-loading {
            color: #888;
            text-align: center;
            padding: 40px;
        }

        /* Hero section */
        .info-hero {
            text-align: center;
            padding: 32px 20px 24px;
            margin-bottom: 28px;
        }
        .info-hero-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
        }
        .info-hero-icon img { width: 64px; height: 64px; border-radius: 16px; }
        .info-hero h2 {
            font-size: 1.5rem;
            color: #e0e0e0;
            margin-bottom: 8px;
        }
        .info-hero h2 span { color: #e94560; }
        .info-hero-sub {
            font-size: 0.92rem;
            color: #888;
            max-width: 520px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* About card */
        .info-about {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 22px 24px;
            margin-bottom: 28px;
            line-height: 1.7;
            font-size: 0.9rem;
            color: #bbb;
        }
        .info-about-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: 600;
            color: #ccc;
            margin-bottom: 10px;
        }
        .info-about-title svg { width: 18px; height: 18px; fill: #e94560; flex-shrink: 0; }

        /* Features grid */
        .info-features {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }
        .info-feature {
            background: #1a1a2e;
            border: 1px solid #222;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            transition: border-color 0.2s;
        }
        .info-feature:hover { border-color: #333; }
        .info-feature-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .info-feature-icon svg { width: 20px; height: 20px; }
        .info-feature-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #ccc;
            margin-bottom: 4px;
        }
        .info-feature-desc {
            font-size: 0.78rem;
            color: #777;
            line-height: 1.4;
        }

        /* Section title */
        .info-section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: 600;
            color: #ccc;
            margin-bottom: 14px;
        }
        .info-section-title svg { width: 18px; height: 18px; fill: #e94560; flex-shrink: 0; }

        /* Link cards */
        .info-links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }
        .info-link-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #1a1a2e;
            border: 1px solid #222;
            border-radius: 10px;
            padding: 16px;
            text-decoration: none;
            transition: border-color 0.2s, transform 0.2s;
        }
        .info-link-card:hover { border-color: #e94560; transform: translateY(-2px); }
        .info-link-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .info-link-icon svg { width: 22px; height: 22px; }
        .info-link-text { min-width: 0; }
        .info-link-name {
            font-size: 0.92rem;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 2px;
        }
        .info-link-url {
            font-size: 0.75rem;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Back to top */
        .back-to-top {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #e94560;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            line-height: 44px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 200;
        }
        .back-to-top.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .back-to-top:hover { transform: scale(1.1); }

        /* ── Progress bar ── */
        #pgbar { position:fixed; top:0; left:0; width:0; height:3px;
                 background:linear-gradient(90deg,#6ea8fe,#a78bfa);
                 z-index:9999; transition:width .3s ease,opacity .4s ease; pointer-events:none; }

        /* ── Skeleton loading ── */
        @keyframes sk-shine { to { background-position: -200% 0; } }
        .skeleton-grid { display:contents; }
        .sk-card { background:#1e2736; border-radius:10px; overflow:hidden; }
        .sk-img  { height:160px; background:linear-gradient(90deg,#243047 33%,#2e3f5a 50%,#243047 66%);
                   background-size:200%; animation:sk-shine 1.4s infinite; }
        .sk-line { height:12px; border-radius:6px; margin:8px 12px;
                   background:linear-gradient(90deg,#243047 33%,#2e3f5a 50%,#243047 66%);
                   background-size:200%; animation:sk-shine 1.4s infinite; }
        .sk-line.short { width:55%; }

        /* ── Card fade-in ── */
        @keyframes cardFadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
        .card { animation: cardFadeIn .25s ease both; }

        /* ── Tag chips ── */
        .tag-chip { display:inline-block; background:#1e3a5f33; border:1px solid #6ea8fe44;
                    color:#93c5fd; border-radius:4px; padding:1px 6px; margin:2px;
                    font-size:.72rem; cursor:pointer; transition:background .15s; }
        .tag-chip:hover { background:#1e3a5f88; }

        /* ── Nouveau badge ── */
        .badge-new { background:#0f5132; color:#75b798; border:1px solid #20c99733; font-size:.68rem; }

        /* ── List mode ── */
        .list-mode { grid-template-columns: 1fr !important; }
        .list-mode .card { display:flex; flex-direction:row; max-height:110px; }
        .list-mode .card-img-wrap { width:80px; min-width:80px; height:110px; flex-shrink:0; }
        .list-mode .card-tags { display:none; }
        .list-mode .card-links { flex-shrink:0; }

        /* ── MAJ search ── */
        .maj-search-bar { padding:8px 0 4px; }
        #majSearch { width:100%; max-width:400px; padding:7px 12px; border-radius:8px;
                     background:#1e2736; border:1px solid #334155; color:#e2e8f0; font-size:.9rem; }

        /* ── Modal nav ── */
        .modal-nav { position:absolute; top:50%; transform:translateY(-50%); background:transparent;
                     border:none; color:#e2e8f066; font-size:1.4rem; border-radius:50%;
                     width:32px; height:32px; cursor:pointer; z-index:10; display:flex;
                     align-items:center; justify-content:center; transition:color .2s; }
        .modal-nav:hover { color:#e2e8f0; }
        .modal-prev { left:4px; } .modal-next { right:4px; }
        .modal-nav:disabled { opacity:.18; cursor:default; }

        /* ── Modal history ── */
        .modal-history { margin-top:14px; border-top:1px solid #334155; padding-top:10px; }
        .modal-history-title { font-size:.78rem; color:#64748b; text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
        .modal-history-entry { display:flex; gap:8px; align-items:baseline; font-size:.82rem; padding:3px 0; border-bottom:1px solid #1e273622; }
        .modal-history-entry .mh-date { color:#64748b; flex-shrink:0; }

        /* ── View toggle button ── */
        #viewToggle { background:none; border:1px solid #444; color:#aaa; padding:6px 10px;
                      border-radius:6px; cursor:pointer; font-size:0.85rem;
                      transition:border-color 0.2s, color 0.2s; }
        #viewToggle:hover { border-color:#e94560; color:#e94560; }

        /* ── Highlight ── */
        mark { background:#6ea8fe33; color:#93c5fd; border-radius:2px; padding:0 1px; }

        /* ── Active tags bar ── */
        #active-tags-bar { padding:0 24px; display:flex; flex-wrap:wrap; gap:6px;
                           align-items:center; min-height:0; }
        #active-tags-bar:empty { padding:0; }
        .active-tag { display:inline-flex; align-items:center; gap:4px; background:#1e3a5f66;
                      border:1px solid #6ea8fe66; color:#93c5fd; border-radius:4px;
                      padding:3px 8px; font-size:.75rem; margin:4px 0; }
        .active-tag-remove { cursor:pointer; opacity:.7; font-size:.9rem; line-height:1; border:none;
                             background:none; color:inherit; padding:0; }
        .active-tag-remove:hover { opacity:1; }
        .tag-chip-active { background:#1e3a5f88 !important; border-color:#6ea8fe99 !important; }

        /* ── Copy link button ── */
        #copyLinkBtn { background:none; border:1px solid #444; color:#aaa; padding:6px 10px;
                       border-radius:6px; cursor:pointer; font-size:0.85rem;
                       transition:border-color .2s, color .2s; }
        #copyLinkBtn:hover { border-color:#6ea8fe; color:#6ea8fe; }

        /* ── Badge décalé ── */
        .badge-decale { background:#7c3a0022; color:#fdba74; border:1px solid #92400e44; font-size:.68rem; }

        /* ── Stats panel ── */
        .stats-panel { display:none; padding:24px; max-width:900px; margin:0 auto; }
        .stats-panel.visible { display:block; }
        .stat-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; margin-bottom:32px; }
        .stat-card { background:#1a1a2e; border:1px solid #222; border-radius:10px; padding:16px; text-align:center; }
        .stat-card-value { font-size:2rem; font-weight:700; color:#e94560; }
        .stat-card-label { font-size:.78rem; color:#888; margin-top:4px; }
        .stat-section { margin-bottom:32px; }
        .stat-section-title { font-size:1rem; font-weight:600; color:#ccc; margin-bottom:14px;
                              border-bottom:1px solid #222; padding-bottom:6px; }
        .stat-bar-row { display:flex; align-items:center; gap:10px; margin-bottom:7px; font-size:.82rem; }
        .stat-bar-label { width:160px; color:#bbb; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }

    <script>
    // ── Parseur CSV (RFC 4180) ────────────────────────────────────────────────
    function parseCSV(text) {
        // Supprime le BOM éventuel
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        const rows = [];
        let i = 0, n = text.length;
        function readField() {
            if (i < n && text[i] === '"') {
                i++;
                let f = '';
                while (i < n) {
                    if (text[i] === '"') {
                        if (i + 1 < n && text[i + 1] === '"') { f += '"'; i += 2; }
                        else { i++; break; }
                    } else { f += text[i++]; }
                }
                return f;
            }
            let f = '';
            while (i < n && text[i] !== ',' && text[i] !== '\n' && text[i] !== '\r') f += text[i++];
            return f;
        }
        while (i < n) {
            const row = [];
            do { row.push(readField()); } while (i < n && text[i] === ',' && ++i);
            if (i < n && text[i] === '\r') i++;
            if (i < n && text[i] === '\n') i++;
            rows.push(row);
        }
        if (rows.length === 0) return [];
        const headers = rows[0];
        return rows.slice(1)
            .filter(r => r.some(f => f !== ''))
            .map(r => Object.fromEntries(headers.map((h, idx) => [h, r[idx] ?? ''])));
    }

    // ── Config Google Sheets (onglet Informations uniquement) ─────────────────
    const SHEET_ID = '1ELRF0kpF8SoUlslX5ZXZoG4WXeWST6lN9bLws32EPfs';

    // ── Cache localStorage ────────────────────────────────────────────────────
    const CACHE_KEY     = 'gx_games_cache';
    const CACHE_TTL     = 5 * 60 * 1000; // 5 minutes

    const searchInput   = document.getElementById('search');
    const filterStatut  = document.getElementById('filterStatut');
    const filterType    = document.getElementById('filterType');
    const filterTradType= document.getElementById('filterTradType');
    const sortBy        = document.getElementById('sortBy');
    const grid          = document.getElementById('grid');
    const stats         = document.getElementById('stats');
    const loadingEl     = document.getElementById('loading');
    const errorEl       = document.getElementById('error');
    const resetBtn      = document.getElementById('resetBtn');
    const cardTpl       = document.getElementById('card-tpl');
    const backToTopBtn  = document.getElementById('backToTop');
    const toggleControlsBtn = document.getElementById('toggleControls');
    const filterTranslator = document.getElementById('filterTranslator');
    const viewToggle       = document.getElementById('viewToggle');
    const majSearchInput   = document.getElementById('majSearch');

    let GAMES_DATA = [];
    let MAJ_ENTRIES = [];
    let TRAD_DATA = [];
    let RECENT_GAMES_SET = new Set();
    let ACTIVE_TAGS    = new Set();
    let lastMajDateMap = new Map();
    let modalNavList = [];
    let modalNavIdx = 0;
    let listMode = false;
    let tradLoaded = false;
    let dataSource = 'cache';
    let lastSyncLabel = '';

    // ── Progress bar ─────────────────────────────────────────────────────────
    const pgbar = document.getElementById('pgbar');
    function showProgress() { pgbar.style.opacity='1'; pgbar.style.width='40%'; }
    function advanceProgress() { pgbar.style.width='75%'; }
    function hideProgress() {
        pgbar.style.width='100%';
        setTimeout(() => { pgbar.style.opacity='0'; pgbar.style.width='0'; }, 400);
    }

    // ── Skeleton ──────────────────────────────────────────────────────────────
    function showSkeleton() {
        loadingEl.innerHTML = Array(8).fill(0).map(() =>
            `<div class="sk-card"><div class="sk-img"></div>
             <div class="sk-line"></div><div class="sk-line short"></div></div>`
        ).join('');
        loadingEl.style.display = 'contents';
    }
    function hideSkeleton() { loadingEl.style.display = 'none'; loadingEl.innerHTML = ''; }

    // ── Badge NOUVEAU ─────────────────────────────────────────────────────────
    function buildRecentGamesSet(entries) {
        RECENT_GAMES_SET = new Set();
        const cutoff = Date.now() - 7 * 86400000;
        for (const e of entries) {
            if (!e.date) continue;
            // Parse FR date dd/mm/yyyy
            const parts = e.date.split('/');
            if (parts.length !== 3) continue;
            const d = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
            if (isNaN(d.getTime()) || d.getTime() < cutoff) continue;
            e.games.split(',').forEach(g => {
                const t = g.trim().toLowerCase();
                if (t) RECENT_GAMES_SET.add(t);
            });
        }
    }

    // ── URL sharing ──────────────────────────────────────────────────────────
    function updateURL() {
        const p = new URLSearchParams();
        if (searchInput.value)       p.set('q',        searchInput.value);
        if (filterStatut.value)      p.set('statut',   filterStatut.value);
        if (filterType.value)        p.set('type',     filterType.value);
        if (filterTradType.value)    p.set('tradtype', filterTradType.value);
        if (filterTranslator.value)  p.set('trad',     filterTranslator.value);
        if (sortBy.value !== 'nom')  p.set('sort',     sortBy.value);
        if (ACTIVE_TAGS.size)        p.set('tags',     [...ACTIVE_TAGS].join(','));
        const str = p.toString();
        history.replaceState(null, '', (str ? '?' + str : location.pathname) + location.hash);
    }

    function readURLParams() {
        const p = new URLSearchParams(location.search);
        if (p.has('q'))        searchInput.value        = p.get('q');
        if (p.has('statut'))   filterStatut.value       = p.get('statut');
        if (p.has('type'))     filterType.value          = p.get('type');
        if (p.has('tradtype')) filterTradType.value      = p.get('tradtype');
        if (p.has('trad'))     filterTranslator.value    = p.get('trad');
        if (p.has('sort'))     sortBy.value              = p.get('sort');
        if (p.has('tags'))     p.get('tags').split(',').filter(Boolean).forEach(t => ACTIVE_TAGS.add(t.trim()));
    }

    // ── Highlight ─────────────────────────────────────────────────────────────
    function highlight(text, query) {
        if (!query) return escapeHtml(text);
        const escaped = escapeHtml(text);
        const safeQ = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return escaped.replace(new RegExp(safeQ, 'gi'), m => `<mark>${m}</mark>`);
    }

    // ── Tri par date de MAJ ───────────────────────────────────────────────────
    function buildLastMajDateMap(entries) {
        lastMajDateMap = new Map();
        for (const e of entries) {
            if (!e.date) continue;
            const parts = e.date.split('/');
            if (parts.length !== 3) continue;
            const d = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
            e.games.split(',').forEach(g => {
                const key = g.trim().toLowerCase();
                if (!key) return;
                if (!lastMajDateMap.has(key) || d > lastMajDateMap.get(key))
                    lastMajDateMap.set(key, d);
            });
        }
    }

    // ── Active tags bar ───────────────────────────────────────────────────────
    function renderActiveTags() {
        const bar = document.getElementById('active-tags-bar');
        bar.innerHTML = '';
        ACTIVE_TAGS.forEach(tag => {
            const chip = document.createElement('span');
            chip.className = 'active-tag';
            chip.innerHTML = `${escapeHtml(tag)}<button class="active-tag-remove" data-tag="${escapeHtml(tag)}" aria-label="Retirer ${escapeHtml(tag)}">×</button>`;
            bar.appendChild(chip);
        });
    }

    function toggleTag(tag) {
        if (ACTIVE_TAGS.has(tag)) ACTIVE_TAGS.delete(tag);
        else ACTIVE_TAGS.add(tag);
        renderActiveTags();
        render();
    }

    // ── Statistiques ──────────────────────────────────────────────────────────
    function renderStats() {
        const contentEl = document.getElementById('statsContent');
        if (!contentEl) return;

        const total     = GAMES_DATA.length;
        const enCours   = GAMES_DATA.filter(g => g.statut === 'EN COURS').length;
        const termines  = GAMES_DATA.filter(g => g.statut === 'TERMINÉ').length;
        const abandonnes= GAMES_DATA.filter(g => g.statut === 'ABANDONNÉ').length;

        function countMap(arr) {
            return arr.reduce((m, k) => { if (k) m.set(k, (m.get(k)||0)+1); return m; }, new Map());
        }

        const topMoteurs = [...countMap(GAMES_DATA.map(g => g.type_moteur)).entries()].sort((a,b)=>b[1]-a[1]).slice(0,10);
        const topTrads   = [...countMap(GAMES_DATA.map(g => g.traducteur)).entries()].sort((a,b)=>b[1]-a[1]).slice(0,10);

        const now = new Date();
        const months = [];
        for (let i = 11; i >= 0; i--) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            months.push({ year: d.getFullYear(), month: d.getMonth(), count: 0,
                          label: d.toLocaleDateString('fr-FR', { month: 'short', year: '2-digit' }) });
        }
        for (const e of MAJ_ENTRIES) {
            if (!e.date) continue;
            const parts = e.date.split('/');
            if (parts.length !== 3) continue;
            const d = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
            const idx = months.findIndex(m => m.year === d.getFullYear() && m.month === d.getMonth());
            if (idx !== -1) months[idx].count++;
        }
        const maxMonth = Math.max(...months.map(m => m.count), 1);

        function barRows(entries) {
            if (!entries.length) return '<div style="color:#666;font-size:.82rem">Aucune donnée</div>';
            const max = entries[0][1];
            return entries.map(([label, count]) => `
                <div class="stat-bar-row">
                    <div class="stat-bar-label" title="${escapeHtml(label)}">${escapeHtml(label)}</div>
                    <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${Math.round(count/max*100)}%"></div></div>
                    <div class="stat-bar-count">${count}</div>
                </div>`).join('');
        }

        contentEl.innerHTML = `
            <div class="stat-cards">
                <div class="stat-card"><div class="stat-card-value">${total}</div><div class="stat-card-label">Jeux total</div></div>
                <div class="stat-card"><div class="stat-card-value">${enCours}</div><div class="stat-card-label">En cours</div></div>
                <div class="stat-card"><div class="stat-card-value">${termines}</div><div class="stat-card-label">Terminés</div></div>
                <div class="stat-card"><div class="stat-card-value">${abandonnes}</div><div class="stat-card-label">Abandonnés</div></div>
            </div>
            <div class="stat-section">
                <div class="stat-section-title">Top moteurs</div>
                ${barRows(topMoteurs)}
            </div>
            <div class="stat-section">
                <div class="stat-section-title">Top traducteurs</div>
                ${barRows(topTrads)}
            </div>
            <div class="stat-section">
                <div class="stat-section-title">Activité mensuelle (12 derniers mois)</div>
                <div class="stat-month-wrap">
                    ${months.map(m => `
                        <div class="stat-month-col">
                            <div class="stat-month-bar" style="height:${Math.round(m.count/maxMonth*100)}%" title="${m.count} MAJ"></div>
                            <div class="stat-month-label">${m.label}</div>
                        </div>`).join('')}
                </div>
            </div>`;
    }

    // ── Dernière mise à jour (via meta.json) ─────────────────────────────────

    async function fetchLastSync() {
        try {
            const res = await fetch('./data/meta.json');
            if (!res.ok) return;
            const data = await res.json();
            if (!data || !data.updated_at) return;
            const d = new Date(data.updated_at);
            lastSyncLabel = 'Dernière mise à jour : ' + d.toLocaleString('fr-FR', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
            if (GAMES_DATA.length) render();
        } catch (e) {}
    }

    // ── Chargement des jeux depuis le CSV statique ────────────────────────────

    function saveCache(games) {
        try {
            localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), games }));
        } catch (e) {}
    }

    function loadCache() {
        try {
            const raw = localStorage.getItem(CACHE_KEY);
            if (!raw) return null;
            const data = JSON.parse(raw);
            if (!data || !Array.isArray(data.games)) return null;
            for (const g of data.games) {
                if (!g._nameL) {
                    g._nameL       = (g.nom        || '').toLowerCase();
                    g._tagsL       = (g.tags        || '').toLowerCase();
                    g._translatorL = (g.traducteur  || '').toLowerCase();
                }
            }
            return data;
        } catch (e) { return null; }
    }

    function normalizeGame(g) {
        return {
            ...g,
            _nameL:       (g.nom       || '').toLowerCase(),
            _tagsL:       (g.tags      || '').toLowerCase(),
            _translatorL: (g.traducteur|| '').toLowerCase()
        };
    }

    async function fetchGames(skipCacheDisplay) {
        if (!skipCacheDisplay) { showProgress(); showSkeleton(); }
        try {
            const res  = await fetch('./data/jeux.csv');
            advanceProgress();
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const text = await res.text();
            const rows = parseCSV(text);

            GAMES_DATA = rows.map(r => normalizeGame({
                id:             parseInt(r.id) || null,
                site:           r.site           || null,
                nom:            r.nom            || '',
                version:        r.version        || null,
                trad_version:   r.trad_version   || null,
                lien_trad:      r.lien_trad      || null,
                statut:         r.statut         || null,
                tags:           r.tags           || null,
                type_moteur:    r.type_moteur    || null,
                traducteur:     r.traducteur     || null,
                relecteur:      r.relecteur      || null,
                type_trad:      r.type_trad      || null,
                ac:             r.ac === 'true',
                image_url:      r.image_url      || null,
                trad_url:       r.trad_url       || null,
                translator_url: r.translator_url || null,
                game_url:       r.id ? `https://f95zone.to/threads/${parseInt(r.id)}` : null
            }));
            dataSource = 'csv';
            saveCache(GAMES_DATA);
            buildGameIndex(GAMES_DATA);

            const savedStatut   = filterStatut.value;
            const savedType     = filterType.value;
            const savedTradType = filterTradType.value;
            const savedTrad     = filterTranslator.value;
            populateFilters();
            filterStatut.value      = savedStatut;
            filterType.value        = savedType;
            filterTradType.value    = savedTradType;
            filterTranslator.value  = savedTrad;
            hideSkeleton();
            hideProgress();
            render();
            // Si l'onglet trad était en attente des données
            if (document.getElementById('tradPanel').classList.contains('visible') && !tradLoaded) fetchTrad();
        } catch (err) {
            hideProgress();
            if (!skipCacheDisplay) {
                hideSkeleton();
                loadingEl.style.display = 'none';
                errorEl.style.display   = 'block';
                errorEl.textContent     = `Erreur de chargement : ${err.message}`;
            }
        }
    }

    function populateFilters() {
        while (filterType.options.length > 1)        filterType.remove(1);
        while (filterTradType.options.length > 1)    filterTradType.remove(1);
        const savedTrad = filterTranslator.value;
        while (filterTranslator.options.length > 1)  filterTranslator.remove(1);

        const types = [...new Set(GAMES_DATA.map(g => g.type_moteur).filter(Boolean))].sort();
        types.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t; opt.textContent = t;
            filterType.appendChild(opt);
        });

        const tradTypes = [...new Set(GAMES_DATA.map(g => g.type_trad).filter(Boolean))].sort();
        tradTypes.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t; opt.textContent = t;
            filterTradType.appendChild(opt);
        });

        const translators = [...new Set(GAMES_DATA.map(g => g.traducteur).filter(Boolean))].sort();
        translators.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t; opt.textContent = t;
            filterTranslator.appendChild(opt);
        });
        filterTranslator.value = savedTrad;
    }

    // ── Plateformes de téléchargement ────────────────────────────────────────

    const PLATFORM_LOGOS = {

    function getTradPlatform(url) {
        if (!url) return { color: '#198754', logo: 'download' };
        let host = '';
        try { host = new URL(url).hostname; } catch(e) {}
        for (const p of PLATFORMS) {
            if (host.includes(p.match)) return p;
        }
        return { color: '#555', logo: 'download' };
    }

    // ── Rendu des cartes ──────────────────────────────────────────────────────

    function statutBadgeClass(statut) {
        if (statut === 'EN COURS') return 'badge-en-cours';
        if (statut === 'TERMINÉ')  return 'badge-termine';
        return 'badge-abandonne';
    }

    function escapeHtml(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    const BATCH_SIZE = 48;
    let currentFiltered = [];
    let displayedCount  = 0;

    const imgObserver = new IntersectionObserver((entries) => {
        for (const entry of entries) {
            if (!entry.isIntersecting) continue;
            const wrap = entry.target;
            const src  = wrap.dataset.src;
            if (!src) continue;
            wrap.classList.add('shimmer');
            const img = document.createElement('img');
            img.className      = 'card-img';
            img.alt            = wrap.dataset.alt || '';
            img.referrerPolicy = 'no-referrer';
            img.src            = src;
            img.onload  = () => { img.classList.add('visible'); wrap.classList.add('loaded'); };
            img.onerror = () => { wrap.style.display = 'none'; };
            wrap.appendChild(img);
            delete wrap.dataset.src;
            imgObserver.unobserve(wrap);
        }
    }, { rootMargin: '300px' });

    function renderCard(game, navIdx) {
        const clone = cardTpl.content.cloneNode(true);
        const card  = clone.querySelector('.card');
        const query = searchInput.value.toLowerCase().trim();

        const imgWrap = card.querySelector('.card-img-wrap');
        if (game.image_url) {
            imgWrap.dataset.src = game.image_url;
            imgWrap.dataset.alt = game.nom;
        } else {
            imgWrap.remove();
        }

        const titleEl = card.querySelector('.card-title');
        if (game.game_url) {
            const a = document.createElement('a');
            a.href = game.game_url; a.target = '_blank'; a.rel = 'noopener';
            a.innerHTML = highlight(game.nom, query);
            titleEl.appendChild(a);
        } else {
            titleEl.innerHTML = highlight(game.nom, query);
        }

        const statutBadge = card.querySelector('.badge-statut');
        statutBadge.textContent = game.statut;
        statutBadge.classList.add(statutBadgeClass(game.statut));

        const typeBadge = card.querySelector('.badge-type');
        if (game.type_moteur) { typeBadge.textContent = game.type_moteur; }
        else { typeBadge.remove(); }

        const tradTypeBadge = card.querySelector('.badge-trad-type');
        if (game.type_trad) { tradTypeBadge.textContent = game.type_trad; }
        else { tradTypeBadge.remove(); }

        // Badge NOUVEAU
        if (RECENT_GAMES_SET.has((game.nom || '').toLowerCase())) {
            const newBadge = document.createElement('span');
            newBadge.className = 'badge badge-new';
            newBadge.textContent = 'NOUVEAU';
            card.querySelector('.card-meta').appendChild(newBadge);
        }

        // Badge ⚠ Retard
        if (game.statut !== 'ABANDONNÉ' && game.version && game.trad_version && game.version !== game.trad_version) {
            const b = document.createElement('span');
            b.className = 'badge badge-decale';
            b.title = `Jeu : ${game.version} | Trad : ${game.trad_version}`;
            b.textContent = '⚠ Retard';
            card.querySelector('.card-meta').appendChild(b);
        }

        const infoEl = card.querySelector('.card-info');
        let infoHtml = `Version: <span>${escapeHtml(game.version)}</span> | Trad: <span>${escapeHtml(game.trad_version)}</span>`;
        if (game.traducteur) {
            const name = escapeHtml(game.traducteur);
            const trad = game.translator_url
                ? `<a href="${escapeHtml(game.translator_url)}" target="_blank" rel="noopener" style="color:#6ea8fe;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${name}</a>`
                : `<span>${name}</span>`;
            infoHtml += `<br>Traducteur: ${trad}`;
        }
        if (game.relecteur) infoHtml += ` | Relecteur: <span>${escapeHtml(game.relecteur)}</span>`;
        infoEl.innerHTML = infoHtml;

        const tagsEl = card.querySelector('.card-tags');
        if (game.tags) {
            tagsEl.innerHTML = game.tags.split(',').map(t => t.trim()).filter(Boolean)
                .map(t => {
                    const isActive = ACTIVE_TAGS.has(t);
                    return `<span class="tag-chip${isActive ? ' tag-chip-active' : ''}" data-tag="${escapeHtml(t)}">${highlight(t, query)}</span>`;
                }).join('');
        } else { tagsEl.remove(); }

        const linksEl = card.querySelector('.card-links');
        if (game.game_url) {
            const gameBtn = linksEl.querySelector('a');
            gameBtn.href      = game.game_url;
            gameBtn.innerHTML = `${PLATFORM_LOGOS.f95}<span>Page F95</span>`;
        } else {
            linksEl.querySelector('a').remove();
        }

        if (game.trad_url) {
            const platform = getTradPlatform(game.trad_url);
            const tradLink = document.createElement('a');
            tradLink.className           = 'btn btn-trad';
            tradLink.href                = game.trad_url;
            tradLink.target              = '_blank';
            tradLink.rel                 = 'noopener';
            tradLink.style.background    = platform.color;
            tradLink.innerHTML           = `${PLATFORM_LOGOS[platform.logo]}<span>Traduction</span>`;
            linksEl.appendChild(tradLink);
        } else if (game.lien_trad && game.lien_trad !== 'Traduction' && game.lien_trad !== 'Patch') {
            const badge = document.createElement('span');
            badge.className   = 'btn btn-integree';
            badge.textContent = game.lien_trad;
            linksEl.appendChild(badge);
        }

        return clone;
    }

    function appendBatch() {
        const end = Math.min(displayedCount + BATCH_SIZE, currentFiltered.length);
        if (displayedCount >= end) return;

        const fragment = document.createDocumentFragment();
        for (let i = displayedCount; i < end; i++) {
            const frag = renderCard(currentFiltered[i], i);
            const card = frag.querySelector('.card');
            if (card) {
                card.style.animationDelay = (i % BATCH_SIZE * 30) + 'ms';
                card.dataset.gidx = i;
            }
            fragment.appendChild(frag);
        }

        fragment.querySelectorAll('.card-img-wrap[data-src]').forEach(w => imgObserver.observe(w));
        grid.appendChild(fragment);
        displayedCount = end;

        stats.textContent = `${displayedCount}/${currentFiltered.length} affiché${displayedCount > 1 ? 's' : ''} sur ${GAMES_DATA.length}${lastSyncLabel ? ' | ' + lastSyncLabel : ''}`;
    }

    const sentinel = document.createElement('div');
    sentinel.style.cssText = 'grid-column:1/-1;height:1px;';
    const scrollObserver = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && displayedCount < currentFiltered.length) {
            appendBatch();
            grid.appendChild(sentinel);
        }
    }, { rootMargin: '600px' });
    scrollObserver.observe(sentinel);

    // ── Filtrage / tri ────────────────────────────────────────────────────────

    let debounceTimer;
    function render() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(_render, 150);
    }

    function _render() {
        hideSkeleton();
        loadingEl.style.display = 'none';
        const query     = searchInput.value.toLowerCase().trim();
        const sStatut   = filterStatut.value;
        const sType     = filterType.value;
        const sTradType = filterTradType.value;
        const sTrad     = filterTranslator.value;
        const sort      = sortBy.value;

        currentFiltered = GAMES_DATA.filter(g => {
            if (query && !g._nameL.includes(query)
                      && !g._tagsL.includes(query)
                      && !g._translatorL.includes(query)) return false;
            if (sStatut   && g.statut       !== sStatut)   return false;
            if (sType     && g.type_moteur  !== sType)     return false;
            if (sTradType && g.type_trad    !== sTradType) return false;
            if (sTrad     && g.traducteur   !== sTrad)     return false;
            if (ACTIVE_TAGS.size && ![...ACTIVE_TAGS].every(t => g._tagsL.includes(t.toLowerCase()))) return false;
            return true;
        });

        currentFiltered.sort((a, b) => {
            if (sort === 'nom')      return (a.nom || '').localeCompare(b.nom || '', 'fr');
            if (sort === 'nom_desc') return (b.nom || '').localeCompare(a.nom || '', 'fr');
            if (sort === 'statut')   return (a.statut || '').localeCompare(b.statut || '', 'fr') || (a.nom || '').localeCompare(b.nom || '', 'fr');
            if (sort === 'recent')   return (lastMajDateMap.get(b._nameL) || new Date(0)) - (lastMajDateMap.get(a._nameL) || new Date(0));
            return 0;
        });

        renderActiveTags();

        saveFiltersState();
        updateResetBtn();

        if (currentFiltered.length === 0) {
            grid.innerHTML = '<div class="no-results">Aucun jeu trouvé</div>';
            stats.textContent = `0 jeu sur ${GAMES_DATA.length}`;
            return;
        }

        grid.innerHTML = '';
        displayedCount = 0;
        appendBatch();
        grid.appendChild(sentinel);
    }

    function saveFiltersState() {
        try {
            sessionStorage.setItem('gx_filters', JSON.stringify({
                search: searchInput.value, statut: filterStatut.value,
                type: filterType.value, tradType: filterTradType.value,
                translator: filterTranslator.value, sort: sortBy.value
            }));
        } catch (e) {}
        updateURL();
    }

    function restoreFiltersState() {
        readURLParams(); // URL params have priority
        try {
            if (location.search) return; // URL params present → skip sessionStorage
            const raw = sessionStorage.getItem('gx_filters');
            if (!raw) return;
            const f = JSON.parse(raw);
            if (f.search)      searchInput.value        = f.search;
            if (f.statut)      filterStatut.value       = f.statut;
            if (f.type)        filterType.value          = f.type;
            if (f.tradType)    filterTradType.value      = f.tradType;
            if (f.translator)  filterTranslator.value    = f.translator;
            if (f.sort)        sortBy.value              = f.sort;
        } catch (e) {}
    }

    function hasActiveFilters() {
        return searchInput.value || filterStatut.value || filterType.value ||
               filterTradType.value || filterTranslator.value || sortBy.value !== 'nom' ||
               ACTIVE_TAGS.size > 0;
    }

    function updateResetBtn() {
        resetBtn.classList.toggle('visible', hasActiveFilters());
    }

    function resetFilters() {
        searchInput.value = ''; filterStatut.value = ''; filterType.value = '';
        filterTradType.value = ''; filterTranslator.value = ''; sortBy.value = 'nom';
        ACTIVE_TAGS.clear(); renderActiveTags();
        render();
    }

    // ── Onglet MAJ (depuis API locale) ────────────────────────────────────────

    const MAJ_CACHE_KEY = 'gx_maj_cache';
    let majLoaded = false;

    async function fetchMaj() {
        try {
            const raw = localStorage.getItem(MAJ_CACHE_KEY);
            if (raw) {
                const data = JSON.parse(raw);
                if (data && Array.isArray(data.entries) && data.entries.length > 0) {
                    renderMaj(data.entries);
                    buildRecentGamesSet(data.entries);
                    buildLastMajDateMap(data.entries);
                    if (Date.now() - data.ts > CACHE_TTL) loadMajFromAPI();
                    return;
                }
            }
        } catch (e) {}

        majLoading.style.display = 'block';
        loadMajFromAPI();
    }

    async function loadMajFromAPI() {
        try {
            const res = await fetch('./data/maj.csv');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const text = await res.text();
            const rows = parseCSV(text);
            const entries = rows.map(r => ({
                date:  r.date_maj ? formatDateFR(r.date_maj) : '',
                type:  r.type  || '',
                games: r.jeux  || ''
            }));
            try {
                localStorage.setItem(MAJ_CACHE_KEY, JSON.stringify({ ts: Date.now(), entries }));
            } catch (e) {}
            renderMaj(entries);
            buildRecentGamesSet(entries);
            buildLastMajDateMap(entries);
        } catch (err) {
            majLoading.textContent = 'Erreur de chargement des mises à jour.';
        }
    }

    function formatDateFR(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function majTypeClass(type) {
        const t = (type || '').toUpperCase();
        if (t.includes('AJOUT'))              return 'maj-type-ajout';
        if (t.includes('MISE') || t.includes('MAJ')) return 'maj-type-maj';
        return 'maj-type-other';
    }

    function renderMaj(entries, query) {
        majLoaded = true;
        majLoading.style.display = 'none';
        MAJ_ENTRIES = entries;

        const q = (query || '').toLowerCase().trim();
        const filtered = q ? entries.filter(e =>
            e.games.toLowerCase().includes(q) ||
            e.type.toLowerCase().includes(q) ||
            e.date.includes(q)
        ) : entries;

        const groups = [];
        let lastDate = null;
        for (const e of filtered) {
            if (e.date !== lastDate) {
                groups.push({ date: e.date, items: [] });
                lastDate = e.date;
            }
            groups[groups.length - 1].items.push(e);
        }

        const fragment = document.createDocumentFragment();
        for (const group of groups) {
            const div     = document.createElement('div');
            div.className = 'maj-date-group';

            const dateEl     = document.createElement('div');
            dateEl.className = 'maj-date';
            dateEl.textContent = group.date;
            div.appendChild(dateEl);

            for (const item of group.items) {
                const row     = document.createElement('div');
                row.className = 'maj-entry';

                const badge     = document.createElement('span');
                badge.className = 'maj-type ' + majTypeClass(item.type);
                badge.textContent = item.type;
                row.appendChild(badge);

                const gamesSpan     = document.createElement('span');
                gamesSpan.className = 'maj-games';
                gamesSpan.innerHTML = annotateGames(item.games);
                row.appendChild(gamesSpan);

                div.appendChild(row);
            }
            fragment.appendChild(div);
        }

        majContent.innerHTML = '';
        majContent.appendChild(fragment);
    }

    function renderMajFiltered() {
        renderMaj(MAJ_ENTRIES, majSearchInput.value);
    }

    // ── Onglet Informations (JSONP Google Sheets — inchangé) ──────────────────

    const INFO_CACHE_KEY = 'gx_info_cache';
    let infoLoaded = false;

    function infoCallback(response) {
        const scriptEl = document.getElementById('gsheet-info');
        if (scriptEl) scriptEl.remove();
        try {
            const rows  = response.table.rows;
            const lines = [];
            for (const row of rows) {
                const c = row.c;
                lines.push(c && c[0] ? (c[0].v != null ? String(c[0].v) : '') : '');
            }
            try {
                localStorage.setItem(INFO_CACHE_KEY, JSON.stringify({ ts: Date.now(), lines }));
            } catch (e) {}
            renderInfo(lines);
        } catch (err) {
            infoLoading.textContent = 'Erreur de chargement des informations.';
        }
    }
    window.infoCallback = infoCallback;

    function fetchInfo() {
        try {
            const raw = localStorage.getItem(INFO_CACHE_KEY);
            if (raw) {
                const data = JSON.parse(raw);
                if (data && Array.isArray(data.lines) && data.lines.length > 0) {
                    renderInfo(data.lines);
                    if (Date.now() - data.ts > CACHE_TTL) loadInfoFromSheet();
                    return;
                }
            }
        } catch (e) {}
        infoLoading.style.display = 'block';
        loadInfoFromSheet();
    }

    function loadInfoFromSheet() {
        const old = document.getElementById('gsheet-info');
        if (old) old.remove();
        const script = document.createElement('script');
        script.id  = 'gsheet-info';
        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:infoCallback&sheet=Informations`;
        script.onerror = function() {
            this.remove();
            infoLoading.textContent = 'Erreur de chargement des informations.';
        };
        document.body.appendChild(script);
    }

    const LINK_META = {
        'discord:':             { icon: 'discord',   name: 'Discord',       color: '#5865F2', desc: 'Rejoindre la communauté' },

    // Overrides d'URLs (prennent le dessus sur les valeurs du Google Sheet)
    const URL_OVERRIDES = {
        'discord:':    'https://discord.f95zone.to/',

    function renderInfo(lines) {
        infoLoaded = true;

        const links = [];
        let i = 1;
        while (i < lines.length) {
            const line = lines[i];
            if (line && line.endsWith(':') && i + 1 < lines.length && isUrl(lines[i + 1])) {
                const key = line.toLowerCase();

        const fragment = document.createDocumentFragment();

        const hero = document.createElement('div');

        hero.innerHTML = `

        const about = document.createElement('div');
        about.className = 'info-about';
        about.innerHTML = `

        fragment.appendChild(about);

        const features = [
            { icon: 'search', title: 'Recherche', desc: 'Trouvez un jeu par nom, tag ou traducteur',          bg: '#0d6efd22', fill: '#6ea8fe' },
            { icon: 'filter', title: 'Filtres',   desc: 'Par statut, moteur de jeu et type de traduction',    bg: '#6f42c122', fill: '#b197fc' },

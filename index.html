    // ── Index jeux → liens cliquables dans MAJ ────────────────────────────────

    let gamesMap  = new Map(); // nom.toLowerCase() → index dans GAMES_DATA
    let gameRegex = null;

    function buildGameIndex(games) {
        gamesMap = new Map();
        for (let i = 0; i < games.length; i++) {
            if (games[i].nom) gamesMap.set(games[i].nom.toLowerCase(), i);
        }
        // Noms triés du plus long au plus court → évite les correspondances partielles
        const escaped = [...gamesMap.keys()]
            .filter(n => n.length >= 3)
            .sort((a, b) => b.length - a.length)
            .map(n => n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
        gameRegex = escaped.length ? new RegExp(`(${escaped.join('|')})`, 'gi') : null;
    }

    function annotateGames(text) {
        if (!text || !gameRegex) return escapeHtml(text || '');
        let result = '', last = 0;
        gameRegex.lastIndex = 0;
        let m;
        while ((m = gameRegex.exec(text)) !== null) {
            result += escapeHtml(text.slice(last, m.index));
            const idx = gamesMap.get(m[0].toLowerCase());
            result += idx !== undefined
                ? `<span class="game-link" data-idx="${idx}">${escapeHtml(m[0])}</span>`
                : escapeHtml(m[0]);
            last = m.index + m[0].length;
        }
        return result + escapeHtml(text.slice(last));
    }

    function openGameModal(navIdx, navList) {
        if (navList) { modalNavList = navList; modalNavIdx = navIdx; }
        const game = modalNavList.length > 0 ? modalNavList[modalNavIdx] : GAMES_DATA[navIdx];
        if (!game) return;

        const imgEl   = document.getElementById('modal-img');
        const titleEl = document.getElementById('modal-title');
        const metaEl  = document.getElementById('modal-meta');
        const infoEl  = document.getElementById('modal-info');
        const linksEl = document.getElementById('modal-links');
        const tagsEl  = document.getElementById('modal-tags');
        const modalPrev = document.getElementById('modalPrev');
        const modalNext = document.getElementById('modalNext');

        // Update nav buttons
        if (modalNavList.length > 1) {
            modalPrev.disabled = modalNavIdx <= 0;
            modalNext.disabled = modalNavIdx >= modalNavList.length - 1;
            modalPrev.style.display = '';
            modalNext.style.display = '';
        } else {
            modalPrev.style.display = 'none';
            modalNext.style.display = 'none';
        }

        if (game.image_url) {
            imgEl.innerHTML = `<img src="${escapeHtml(game.image_url)}" referrerpolicy="no-referrer" alt="${escapeHtml(game.nom)}">`;
            imgEl.style.display = '';
        } else {
            imgEl.innerHTML = ''; imgEl.style.display = 'none';
        }

        titleEl.innerHTML = game.game_url
            ? `<a href="${escapeHtml(game.game_url)}" target="_blank" rel="noopener">${escapeHtml(game.nom)}</a>`
            : escapeHtml(game.nom);

        let metaHtml = `<span class="badge ${statutBadgeClass(game.statut)}">${escapeHtml(game.statut||'')}</span>`;
        if (game.type_moteur) metaHtml += `<span class="badge badge-type">${escapeHtml(game.type_moteur)}</span>`;
        if (game.type_trad)   metaHtml += `<span class="badge badge-trad-type">${escapeHtml(game.type_trad)}</span>`;
        if (game.statut !== 'ABANDONNÉ' && game.version && game.trad_version && game.version !== game.trad_version)
            metaHtml += `<span class="badge badge-decale" title="Jeu : ${escapeHtml(game.version)} | Trad : ${escapeHtml(game.trad_version)}">⚠ Retard</span>`;
        metaEl.innerHTML = metaHtml;

        let infoHtml = `Version: <span>${escapeHtml(game.version||'—')}</span> | Trad: <span>${escapeHtml(game.trad_version||'—')}</span>`;
        if (game.traducteur) {
            const name = escapeHtml(game.traducteur);
            infoHtml += `<br>Traducteur: ${game.translator_url
                ? `<a href="${escapeHtml(game.translator_url)}" target="_blank" rel="noopener" style="color:#6ea8fe;text-decoration:none">${name}</a>`
                : `<span>${name}</span>`}`;
        }
        if (game.relecteur) infoHtml += ` | Relecteur: <span>${escapeHtml(game.relecteur)}</span>`;
        infoEl.innerHTML = infoHtml;
        tagsEl.textContent = game.tags || '';

        let linksHtml = '';
        if (game.game_url) {
            linksHtml += `<a class="btn btn-game" href="${escapeHtml(game.game_url)}" target="_blank" rel="noopener">${PLATFORM_LOGOS.f95}<span>Page F95</span></a>`;
        }
        if (game.trad_url) {
            const p = getTradPlatform(game.trad_url);
            linksHtml += `<a class="btn btn-trad" href="${escapeHtml(game.trad_url)}" target="_blank" rel="noopener" style="background:${p.color}">${PLATFORM_LOGOS[p.logo]}<span>Traduction</span></a>`;
        } else if (game.lien_trad && game.lien_trad !== 'Traduction' && game.lien_trad !== 'Patch') {
            linksHtml += `<span class="btn btn-integree">${escapeHtml(game.lien_trad)}</span>`;
        }
        linksEl.innerHTML = linksHtml;

        // Historique MAJ
        const histEl = document.getElementById('modal-history-list');
        const histContainer = document.getElementById('modal-history');
        const gameName = (game.nom || '').toLowerCase();
        const history = MAJ_ENTRIES.filter(e =>
            e.games.toLowerCase().split(',').map(s => s.trim()).includes(gameName)
        );
        if (history.length > 0) {
            histEl.innerHTML = history.slice(0, 8).map(e =>
                `<div class="modal-history-entry">
                    <span class="mh-date">${escapeHtml(e.date)}</span>
                    <span class="maj-type ${majTypeClass(e.type)}">${escapeHtml(e.type)}</span>
                </div>`
            ).join('');
            histContainer.style.display = '';
        } else {
            histContainer.style.display = 'none';
        }

        document.getElementById('game-modal').classList.add('visible');
        document.body.style.overflow = 'hidden';
    }

    function closeGameModal() {
        document.getElementById('game-modal').classList.remove('visible');
        document.body.style.overflow = '';
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { closeGameModal(); closeTradModal(); }
        if (e.key === 'ArrowLeft'  && document.getElementById('game-modal').classList.contains('visible')) {
            if (modalNavIdx > 0) { modalNavIdx--; openGameModal(modalNavIdx); }
        }
        if (e.key === 'ArrowRight' && document.getElementById('game-modal').classList.contains('visible')) {
            if (modalNavIdx < modalNavList.length - 1) { modalNavIdx++; openGameModal(modalNavIdx); }
        }
    });

    // ── Onglet Traducteurs / Relecteurs ──────────────────────────────────────

    function fetchTrad() {
        // Reconstruction depuis GAMES_DATA (pas d'API dédiée en mode statique)
        if (!GAMES_DATA.length) {
            // Les jeux ne sont pas encore chargés — on retente après fetchGames
            document.getElementById('tradLoading').textContent = 'En attente des données jeux...';
            return;
        }
        const tradMap = new Map();
        for (const g of GAMES_DATA) {
            if (g.traducteur) {
                const nom = g.traducteur.trim();
                if (!tradMap.has(nom)) tradMap.set(nom, { nom, nb_trad: 0, nb_relecture: 0 });
                tradMap.get(nom).nb_trad++;
            }
            if (g.relecteur) {
                g.relecteur.split(',').forEach(r => {
                    const nom = r.trim();
                    if (!nom) return;
                    if (!tradMap.has(nom)) tradMap.set(nom, { nom, nb_trad: 0, nb_relecture: 0 });
                    tradMap.get(nom).nb_relecture++;
                });
            }
        }
        TRAD_DATA = [...tradMap.values()].sort((a, b) =>
            (b.nb_trad + b.nb_relecture) - (a.nb_trad + a.nb_relecture));
        document.getElementById('tradLoading').style.display = 'none';
        renderTrad();
        tradLoaded = true;
    }

    function renderTrad(query) {
        const q = (query || '').toLowerCase().trim();
        const filtered = q ? TRAD_DATA.filter(t => (t.nom || '').toLowerCase().includes(q)) : TRAD_DATA;
        const grid = document.getElementById('tradGrid');
        grid.innerHTML = '';
        if (!filtered.length) {
            grid.innerHTML = '<div style="color:#666;padding:40px 0;text-align:center;grid-column:1/-1">Aucun contributeur trouvé</div>';
            return;
        }
        const fragment = document.createDocumentFragment();
        for (const t of filtered) {
            const card = document.createElement('div');
            card.className = 'trad-card';
            card.innerHTML = `
                <div class="trad-card-name">${escapeHtml(t.nom)}</div>
                <div class="trad-card-stats">
                    <div class="trad-stat">
                        <div class="trad-stat-value">${t.nb_trad || 0}</div>
                        <div class="trad-stat-label">Traductions</div>
                    </div>
                    <div class="trad-stat">
                        <div class="trad-stat-value">${t.nb_relecture || 0}</div>
                        <div class="trad-stat-label">Relectures</div>
                    </div>
                </div>`;
            card.addEventListener('click', () => openTradModal(t));
            fragment.appendChild(card);
        }
        grid.appendChild(fragment);
    }

    function openTradModal(trad) {
        const nom = trad.nom;
        const jeuxTrad   = GAMES_DATA.filter(g => g.traducteur === nom);
        const jeuxRelect = GAMES_DATA.filter(g => g.relecteur &&
            g.relecteur.split(',').map(s => s.trim()).includes(nom));

        document.getElementById('trad-modal-name').textContent = nom;

        document.getElementById('trad-modal-stats').innerHTML = `
            <div class="trad-modal-stat">
                <div class="trad-modal-stat-value">${trad.nb_trad || jeuxTrad.length}</div>
                <div class="trad-modal-stat-label">Traductions</div>
            </div>
            <div class="trad-modal-stat">
                <div class="trad-modal-stat-value">${trad.nb_relecture || jeuxRelect.length}</div>
                <div class="trad-modal-stat-label">Relectures</div>
            </div>`;

        const metaEl = document.getElementById('trad-modal-meta');
        metaEl.innerHTML = '';
        metaEl.style.display = 'none';

        const gamesEl = document.getElementById('trad-modal-games');
        let gamesHtml = '';

        if (jeuxTrad.length) {
            gamesHtml += `<div class="trad-games-section">
                <div class="trad-games-title">Jeux traduits (${jeuxTrad.length})</div>`;
            for (const g of jeuxTrad) {
                const href = g.game_url || '#';
                gamesHtml += `<a class="trad-game-link" href="${escapeHtml(href)}" target="_blank" rel="noopener">
                    <span>${escapeHtml(g.nom)}</span>
                    <span class="trad-game-statut">${escapeHtml(g.statut || '')}</span>
                </a>`;
            }
            gamesHtml += '</div>';
        }

        if (jeuxRelect.length) {
            gamesHtml += `<div class="trad-games-section">
                <div class="trad-games-title">Jeux relus (${jeuxRelect.length})</div>`;
            for (const g of jeuxRelect) {
                const href = g.game_url || '#';
                gamesHtml += `<a class="trad-game-link" href="${escapeHtml(href)}" target="_blank" rel="noopener">
                    <span>${escapeHtml(g.nom)}</span>
                    <span class="trad-game-statut">${escapeHtml(g.statut || '')}</span>
                </a>`;
            }
            gamesHtml += '</div>';
        }

        if (!gamesHtml) {
            gamesHtml = '<div class="trad-modal-empty">Aucun jeu associé trouvé dans les données.</div>';
        }
        gamesEl.innerHTML = gamesHtml;

        document.getElementById('trad-modal').classList.add('visible');
        document.body.style.overflow = 'hidden';
    }

    function closeTradModal() {
        document.getElementById('trad-modal').classList.remove('visible');
        document.body.style.overflow = '';
    }

    // ── Navigation par onglets ────────────────────────────────────────────────

    const tabJeux    = document.getElementById('tabJeux');
    const tabMaj     = document.getElementById('tabMaj');
    const tabInfo    = document.getElementById('tabInfo');
    const tabTrad    = document.getElementById('tabTrad');
    const tabStats   = document.getElementById('tabStats');
    const majPanel   = document.getElementById('majPanel');
    const infoPanel  = document.getElementById('infoPanel');
    const tradPanel  = document.getElementById('tradPanel');
    const statsPanel = document.getElementById('statsPanel');
    const infoLoading= document.getElementById('infoLoading');
    const infoContent= document.getElementById('infoContent');
    const majLoading = document.getElementById('majLoading');
    const majContent = document.getElementById('majContent');
    const controlsEl = document.getElementById('controls');

    let controlsCollapsed = false;

    function switchTab(tab, pushHash) {
        tabJeux.classList.remove('active');
        tabMaj.classList.remove('active');
        tabInfo.classList.remove('active');
        tabTrad.classList.remove('active');
        tabStats.classList.remove('active');
        grid.style.display      = 'none';
        controlsEl.style.display= 'none';
        stats.style.display     = 'none';
        majPanel.classList.remove('visible');
        infoPanel.classList.remove('visible');
        tradPanel.classList.remove('visible');
        statsPanel.classList.remove('visible');

        if (tab === 'maj') {
            tabMaj.classList.add('active');
            majPanel.classList.add('visible');
            if (!majLoaded) fetchMaj();
        } else if (tab === 'info') {
            tabInfo.classList.add('active');
            infoPanel.classList.add('visible');
            if (!infoLoaded) fetchInfo();
        } else if (tab === 'trad') {
            tabTrad.classList.add('active');
            tradPanel.classList.add('visible');
            if (!tradLoaded) fetchTrad();
        } else if (tab === 'stats') {
            tabStats.classList.add('active');
            statsPanel.classList.add('visible');
            renderStats();
        } else {
            tab = 'jeux';
            tabJeux.classList.add('active');
            grid.style.display       = '';
            controlsEl.style.display = '';
            if (controlsCollapsed) controlsEl.classList.add('collapsed');
            stats.style.display      = '';
        }

        if (pushHash !== false) {
            history.replaceState(null, '', tab === 'jeux' ? location.pathname + location.search : '#' + tab);
        }
    }

    tabJeux.addEventListener('click',  () => switchTab('jeux'));
    tabMaj.addEventListener ('click',  () => switchTab('maj'));
    tabInfo.addEventListener('click',  () => switchTab('info'));
    tabTrad.addEventListener('click',  () => switchTab('trad'));
    tabStats.addEventListener('click', () => switchTab('stats'));
    majPanel.addEventListener('click', (e) => {
        const el = e.target.closest('.game-link');
        if (el) openGameModal(parseInt(el.dataset.idx), GAMES_DATA);
    });
    window.addEventListener('hashchange', () => {
        const h = location.hash.replace('#', '') || 'jeux';
        switchTab(h, false);
    });

    // ── Misc UI ───────────────────────────────────────────────────────────────

    window.addEventListener('scroll', () => {
        backToTopBtn.classList.toggle('visible', window.scrollY > 600);
    }, { passive: true });

    backToTopBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    toggleControlsBtn.addEventListener('click', () => {
        controlsCollapsed = !controlsCollapsed;
        controlsEl.classList.toggle('collapsed', controlsCollapsed);
        toggleControlsBtn.textContent = controlsCollapsed ? 'Filtres +' : 'Filtres';
    });
    if (window.innerWidth <= 768) {
        controlsCollapsed = true;
        controlsEl.classList.add('collapsed');
        toggleControlsBtn.textContent = 'Filtres +';
    }

    searchInput.addEventListener('input',  render);
    filterStatut.addEventListener('change', render);
    filterType.addEventListener('change',   render);
    filterTradType.addEventListener('change', render);
    sortBy.addEventListener('change',       render);
    resetBtn.addEventListener('click',      resetFilters);

    // Tag chips event delegation (multi-sélection)
    grid.addEventListener('click', e => {
        const chip = e.target.closest('.tag-chip');
        if (chip) toggleTag(chip.dataset.tag);
    });

    // Active tags bar — retrait des tags
    document.getElementById('active-tags-bar').addEventListener('click', e => {
        const btn = e.target.closest('.active-tag-remove');
        if (btn) toggleTag(btn.dataset.tag);
    });

    // Copy link button
    document.getElementById('copyLinkBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(location.href).then(() => {
            const btn = document.getElementById('copyLinkBtn');
            const prev = btn.textContent;
            btn.textContent = '✓';
            btn.style.color = '#63d99a';
            setTimeout(() => { btn.textContent = prev; btn.style.color = ''; }, 2000);
        });
    });

    // View toggle
    viewToggle.addEventListener('click', () => {
        listMode = !listMode;
        grid.classList.toggle('list-mode', listMode);
        viewToggle.textContent = listMode ? '⊟' : '⊞';
        viewToggle.title = listMode ? 'Vue grille' : 'Vue liste';
    });

    // MAJ search
    let majSearchTimer;
    majSearchInput.addEventListener('input', () => {
        clearTimeout(majSearchTimer);
        majSearchTimer = setTimeout(renderMajFiltered, 200);
    });

    // Modal nav
    document.getElementById('modalPrev').addEventListener('click', () => {
        if (modalNavIdx > 0) { modalNavIdx--; openGameModal(modalNavIdx); }
    });
    document.getElementById('modalNext').addEventListener('click', () => {
        if (modalNavIdx < modalNavList.length - 1) { modalNavIdx++; openGameModal(modalNavIdx); }
    });

    filterTranslator.addEventListener('change', render);

    // Trad search
    let tradSearchTimer;
    document.getElementById('tradSearch').addEventListener('input', e => {
        clearTimeout(tradSearchTimer);
        tradSearchTimer = setTimeout(() => renderTrad(e.target.value), 200);
    });

    // ── Démarrage ─────────────────────────────────────────────────────────────

    (function init() {
        fetchLastSync();
        // Pre-load RECENT_GAMES_SET from MAJ cache if available
        try {
            const majRaw = localStorage.getItem(MAJ_CACHE_KEY);
            if (majRaw) {
                const majData = JSON.parse(majRaw);
                if (majData && Array.isArray(majData.entries)) {
                    buildRecentGamesSet(majData.entries);
                    buildLastMajDateMap(majData.entries);
                }
            }
        } catch(e) {}
        const cached = loadCache();
        if (cached && cached.games.length > 0) {
            GAMES_DATA = cached.games;
            dataSource = 'cache';
            buildGameIndex(GAMES_DATA);
            populateFilters();
            restoreFiltersState();
            render();
            if (Date.now() - cached.ts > CACHE_TTL) fetchGames(true);
        } else {
            fetchGames();
        }

        const hash = location.hash.replace('#', '');
        if (['maj', 'info', 'trad', 'stats'].includes(hash)) switchTab(hash, false);
    })();
    </script>

    <script data-goatcounter="https://theblackcat47.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</body>
</html>
